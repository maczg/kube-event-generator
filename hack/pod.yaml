apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: default
spec:
  schedulerName: custom-scheduler
  containers:
    - name: test-container
      image: busybox
      command: [ "sh", "-c", "echo Hello, Kubernetes! && sleep 3600" ]
      resources:
        requests:
          memory: "100Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"